# This is a basic workflow to help you get started with Actions

name: CD Dev

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: [ "Dev" ]
  # pull_request:
  # branches: [ "master" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v3

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_KEY_GESTOR }}
          known_hosts: unnecessary

      - name: Adding Known Hosts
        run: ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }}  >> ~/.ssh/known_hosts

      # - name: Deploy with rsync
      #   run: rsync -avz -e "ssh -p ${{ secrets.SSH_PORT }}" ./dist/ ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/var/www/zellwk.com/

      # Runs a single command using the runners shell
      - name: Actualizando Desarrollo TEAMS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY_GESTOR }}
          port: ${{ secrets.SSH_PORT }}
          # script: |
          # echo Copiando y reiniciando servidor de pruebas de TEAMS
          # /home/odoo/copiar_archivo_compose-git.sh v13 16_p gestor_team r s
          script: |
            echo Copiando y reiniciando servidor de pruebas de TEAMS
            cd /home/odoo/docker/16_p/extra-addons/gestor_team
            git checkout Dev
            git pull
            cd /home/odoo/docker/16_p
            docker-compose restart
